<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Gestion des données{% endblock %}</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  main {
    flex: 1;
  }
</style>
</head>
<body>
 <!-- Barre de navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <!-- Logo qui renvoie vers l'accueil -->
   <a class="navbar-brand fw-bold" href="{% url 'home' %}">
  <i class="bi bi-journal-bookmark-fill"></i> Mon Projet Django
</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'contacts:etudiant_list' %}">Étudiants</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'contacts:cours_list' %}">Cours</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'contacts:inscription_list' %}">Inscriptions</a>
        </li>
       {% if user.is_authenticated %}
  <li class="nav-item">
    <form method="post" action="{% url 'logout' %}" class="d-inline">
      {% csrf_token %}
      <button type="submit" class="nav-link btn btn-link ">Déconnexion</button>
    </form>
  </li>
{% else %}
  <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Connexion</a></li>
{% endif %}

      </ul>
    </div>
  </div>
</nav>

  <!-- Contenu principal -->
  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <footer class="bg-dark text-white text-center py-3 mt-5">
  <p>&copy; 2026 - Mon Projet Django | Réalisé par Lina</p>
  </footer>
</body>


</html>
