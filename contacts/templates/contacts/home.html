{% extends 'contacts/base.html' %}
{% block title %}Accueil{% endblock %}
{% block content %}
<div class="row mt-5">
  <div class="col-md-4">
    <div class="card text-center shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Étudiants</h5>
        <p class="card-text">Gérer les informations des étudiants.</p>
        <a href="{% url 'contacts:etudiant_list' %}" class="btn btn-primary">Accéder</a>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Cours</h5>
        <p class="card-text">Consulter et gérer les cours.</p>
        <a href="{% url 'contacts:cours_list' %}" class="btn btn-success">Accéder</a>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Inscriptions</h5>
        <p class="card-text">Suivre les inscriptions des étudiants.</p>
        <a href="{% url 'contacts:inscription_list' %}" class="btn btn-warning">Accéder</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
