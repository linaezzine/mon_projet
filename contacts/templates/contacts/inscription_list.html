{% extends 'contacts/base.html' %}
{% block content %}
<h1>Liste des inscriptions</h1>
<a href="{% url 'contacts:inscription_add' %}" class="btn btn-success mb-3">+ Ajouter</a>
<table class="table table-striped table-hover shadow-sm">
  <thead class="table-dark">
    <tr>
      <th>Étudiant</th>
      <th>Cours</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for inscription in inscriptions %}
    <tr>
      <td>{{ inscription.etudiant.nom }}</td>
      <td>{{ inscription.cours.titre }}</td>
      <td>
        <a href="{% url 'contacts:inscription_detail' inscription.pk %}" class="btn btn-sm btn-info">Voir</a>
        <a href="{% url 'contacts:inscription_update' inscription.pk %}" class="btn btn-sm btn-warning">Modifier</a>
        <a href="{% url 'contacts:inscription_delete' inscription.pk %}" class="btn btn-sm btn-danger">Supprimer</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
