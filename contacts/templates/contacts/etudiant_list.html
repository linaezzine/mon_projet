{% extends 'contacts/base.html' %}
{% block content %}
<h1>Liste des étudiants</h1>
<a href="{% url 'contacts:etudiant_add' %}" class="btn btn-success mb-3">+ Ajouter</a>
<table class="table table-striped table-hover shadow-sm">
  <thead class="table-dark">
    <tr>
      <th>Nom</th>
      <th>Prénom</th>
      <th>Email</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for etudiant in etudiants %}
    <tr>
      <td>{{ etudiant.nom }}</td>
      <td>{{ etudiant.prenom }}</td>
      <td>{{ etudiant.email }}</td>
      <td>
        <a href="{% url 'contacts:etudiant_detail' etudiant.pk %}" class="btn btn-sm btn-info">Voir</a>
        <a href="{% url 'contacts:etudiant_edit' etudiant.pk %}" class="btn btn-sm btn-warning">Modifier</a>
        <a href="{% url 'contacts:etudiant_delete' etudiant.pk %}" class="btn btn-sm btn-danger">Supprimer</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
