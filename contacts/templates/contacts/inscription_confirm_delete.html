{% extends 'contacts/base.html' %}
{% block content %}
<h2>Confirmer la suppression</h2>
<p>Voulez-vous vraiment supprimer l’inscription de {{ inscription.etudiant.nom }} au cours {{ inscription.cours.titre }} ?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Supprimer</button>
  <a href="{% url 'contacts:inscription_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
